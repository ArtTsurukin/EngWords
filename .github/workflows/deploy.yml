name: Build and Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: artemtsurukin/eng_words_bot:1.0

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Deploy to VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}
          cd ~/deploy

            # Проверяем, что Docker доступен
          docker --version

            # Скачиваем новый образ
          echo "Скачиваем новый образ..."
          docker-compose pull bot_app

            # Перезапускаем только бота (БД останется нетронутой)
          echo "Перезапускаем сервис бота..."
          docker-compose up -d --no-deps bot_app

            # Проверяем, что контейнер запустился
          echo "Проверяем статус..."
          sleep 5
          docker-compose ps

            # Очищаем старые образы
          docker image prune -f --filter "until=24h"







