services:
  bot_db:
    image: postgres:15-alpine
    container_name: bot_db
    networks:
      - bot_network
    env_file:
      - .env.production
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - bot_app_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bot_user}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 380M
    mem_reservation: 128M

  bot_app:
    image: artemtsurukin/eng_words_bot:1.0
    container_name: bot_app
    networks:
      - bot_network
    env_file:
      - .env.production
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      bot_db:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 448M
    mem_reservation: 128M

volumes:
  bot_app_data:

networks:
  bot_network:
    driver: bridge